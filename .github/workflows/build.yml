name: Build & Sync Design System

on:
  push:
    branches:
      - main   # fires when a PR is merged to main
    paths-ignore:
      - '**.md'

  pull_request:
    branches:
      - main   # fires automatically when a PR is raised or updated against main

  workflow_dispatch:  # manual trigger — adds "Run workflow" button in GitHub Actions UI

permissions:
  contents: write
  packages: read

jobs:

  # ─── Job 1: Build ────────────────────────────────────────────────────────────
  # Runs on every PR and every merge — verifies the code compiles cleanly
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout design system
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulseai-components-dist
          path: packages/components/dist/
          retention-days: 30

  # ─── Job 2: Sync ─────────────────────────────────────────────────────────────
  # Runs only when a PR is merged to main — bumps version and syncs to platform
  sync:
    name: Sync to Platform
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout design system
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Bump patch version
        run: |
          cd packages/tokens
          npm version patch --no-git-tag-version
          cd ../components
          npm version patch --no-git-tag-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/tokens/package.json packages/components/package.json
          git commit -m "chore: bump patch version [skip ci]"
          git push

      - name: Checkout pulseai-platform
        uses: actions/checkout@v4
        with:
          repository: ltm-pulseai/pulseai-platform
          path: pulseai-platform
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}

      - name: Sync compiled files to platform repo
        run: |
          rm -rf pulseai-platform/packages/design-system/dist
          mkdir -p pulseai-platform/packages/design-system
          cp -r packages/components/dist pulseai-platform/packages/design-system/dist
          cp packages/components/package.json pulseai-platform/packages/design-system/package.json

      - name: Commit and push to platform repo
        run: |
          cd pulseai-platform
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/design-system
          git diff --cached --quiet || git commit -m "chore: sync design system dist from pulseai-design-system@${{ github.sha }}"
          git push
