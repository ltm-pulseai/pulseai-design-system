name: Build & Publish Design System

on:
  push:
    branches:
      - main   # fires when a PR is merged to main

permissions:
  contents: read
  packages: write  # needed to publish to GitHub Packages

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up pnpm BEFORE Node so corepack can activate the right version
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # 3. Set up Node with the GitHub Packages registry baked in
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@pulseai'   # must match the package name prefix

      # 4. Install all workspace dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build all packages (tokens → styles → components)
      - name: Build packages
        run: pnpm build

      # 6. Upload the compiled dist/ as a CI artifact
      #    (handy for debugging and for consuming without a registry)
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulseai-components-dist
          path: packages/components/dist/
          retention-days: 30

      # 7. Publish to GitHub Packages (tokens first, then components)
      - name: Publish @pulseai/tokens
        run: pnpm --filter @pulseai/tokens publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @pulseai/components
        run: pnpm --filter @pulseai/components publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # NODE_AUTH_TOKEN is auto-provided by GITHUB_TOKEN — no manual secret needed
